# Skillscript runtime configuration.
# Generated by `skillfile init`. Re-running init does not overwrite this file.

[paths]
# Where skill files live. Filesystem SkillStore reads/writes here.
skills_dir = "~/.skillscript/skills"

# SQLite database for the bundled-default MemoryStore.
memory_db = "~/.skillscript/memory.db"

# Plugin discovery roots (filesystem + npm packages, per the v1 spec).
plugins_dir = "~/.skillscript/plugins"

[plugins]
# Resolution order: filesystem first, then npm packages. Operators with
# security-conscious deployments invert this to ["packages"] only.
resolution_order = ["filesystem", "packages"]

[local_model.default]
# Bundled-default LocalModel: Ollama gemma2:9b at localhost.
kind = "ollama"
base_url = "http://localhost:11434"
model_tag = "gemma2:9b"
timeout_ms = 60000

[local_model.qwen]
kind = "ollama"
base_url = "http://localhost:11434"
model_tag = "qwen2.5:7b"
timeout_ms = 60000

[runtime]
# `@@` opt-in unsafe shell. Disabled by default. v1 spec gates this behind
# explicit opt-in plus a tier-2 lint warning.
enable_unsafe_shell = false

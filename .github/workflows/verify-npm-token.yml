name: verify-npm-token

# One-shot: confirm the regenerated NPM_TOKEN bypasses 2FA on publish.
# `npm publish --dry-run` exercises the write path against the registry
# without actually publishing. EOTP error if bypass-2FA is off; success
# if it's on. Delete after a green run.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Publish dry-run with NPM_TOKEN
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          echo "Running: npm publish --dry-run --access public --ignore-scripts"
          npm publish --dry-run --access public --ignore-scripts
          echo "OK: dry-run completed without EOTP error. Token bypasses 2FA on publish."
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Allow esbuild/vitest postinstall scripts in CI.
          PNPM_ALLOW_BUILD_SCRIPTS: "*"

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: LOC ceiling check
        run: pnpm run loc-check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm exec vitest run
